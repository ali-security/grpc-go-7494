name: Lock Threads

on:
  workflow_dispatch:
permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-22.04
    steps:
      - uses: dessant/lock-threads@v2
        with:
          github-token: ${{ github.token }}
          issue-lock-inactive-days: 180
          pr-lock-inactive-days: 180
